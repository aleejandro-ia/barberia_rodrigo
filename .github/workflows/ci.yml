name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Non-blocking: the codebase has pre-existing lint findings from the
      # React 19 / Next 16 rule set (purity, set-state-in-effect) that predate
      # this pipeline. Surfaced for visibility without failing the build until
      # they are cleaned up.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Unit tests
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          # Build-time public env. Real secrets live in Vercel; these are only
          # to satisfy module init during `next build` in CI.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
